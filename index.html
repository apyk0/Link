        // Détection du navigateur
        let browser = "Inconnu";
        const ua = navigator.userAgent;
        if (ua.includes("Instagram")) browser = "Instagram App 📸";
        else if (ua.includes("FBAN") || ua.includes("FBAV")) browser = "Facebook App 🔵";
        else if (ua.includes("Chrome")) browser = "Chrome 🌐";
        else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari 🧭";

        const platform = navigator.userAgentData ? navigator.userAgentData.platform : navigator.platform;
        const lang = navigator.language.toUpperCase();
        const time = new Date().toLocaleTimeString('fr-FR');
        const screenRes = screen.width + "x" + screen.height;
        const theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? "Sombre 🌙" : "Clair ☀️";
        
        let message = "🔥 Nouveau Scan !\n";
        message += "━━━━━━━━━━━━━━━\n";
        message += "🕒 Heure    : " + time + "\n";
        message += "🌍 Langue   : " + lang + "\n";
        message += "🌐 Navig.   : " + browser + "\n";
        message += "📱 Appareil : " + platform + "\n";
        message += "🖥 Écran    : " + screenRes + "\n";
        message += "🎨 Thème    : " + theme + "\n";
        message += "━━━━━━━━━━━━━━━";

        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`;
