<head>

    <script>

    <script>
      async function sendTelegram() {
        const token = "8643586734:AAGqBl0fkAwFyvVK77NQUwQt4M8ww22NcVs";
        const chat_id = "8270323977";

        // 1. Récupération de l'opérateur (Réseau)
        let operator = "Inconnu";
        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            operator = data.org || "Inconnu";
        } catch (e) { operator = "Non détecté"; }

        // 2. Détection du navigateur
        let browser = "Inconnu";
        const ua = navigator.userAgent;
        if (ua.includes("Instagram")) browser = "Instagram 📸";
        else if (ua.includes("Chrome")) browser = "Chrome 🌐";
        else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari 🧭";
        else if (ua.includes("Firefox")) browser = "Firefox 🦊";
        else browser = "Web Mobile";

        // 3. Autres infos (Appareil, Langue, Heure, Thème)
        const platform = navigator.userAgentData ? navigator.userAgentData.platform : navigator.platform;
        const lang = (navigator.language || "FR").toUpperCase();
        const time = new Date().toLocaleTimeString('fr-FR');
        const theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? "Sombre 🌙" : "Clair ☀️";
        
        // 4. Construction du message final
        let message = "🔥 SCAN HOODIE DÉTECTÉ !\n";
        message += "━━━━━━━━━━━━━━━\n";
        message += "🕒 Heure    : " + time + "\n";
        message += "🌍 Langue   : " + lang + "\n";
        message += "🌐 Navig.   : " + browser + "\n";
        message += "📱 Appareil : " + platform + "\n";
        message += "🎨 Thème    : " + theme + "\n";
        message += "📡 Réseau   : " + operator + "\n";
        message += "━━━━━━━━━━━━━━━";

        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`;
        
        // Envoi via image (méthode la plus discrète et robuste)
        const img = new Image();
        img.src = url;
      }
      
      sendTelegram();
    </script>
