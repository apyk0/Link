    <script>
      function sendTelegram() {
        // --- REMPLACE CES DEUX VALEURS ---
        const token = "TON_API_TOKEN_ICI"; 
        const chat_id = "TON_ID_PERSONNEL_ICI";
        // --------------------------------
        
        const platform = navigator.userAgentData ? navigator.userAgentData.platform : navigator.platform;
        const lang = navigator.language;
        const time = new Date().toLocaleTimeString('fr-FR');
        
        let message = "🚀 Nouveau Scan HOODIE !\n";
        message += "━━━━━━━━━━━━━━━\n";
        message += "🕒 Heure : " + time + "\n";
        message += "📱 Appareil : " + platform + "\n";
        message += "🌍 Langue : " + lang + "\n";
        message += "━━━━━━━━━━━━━━━";

        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`;
        
        // 'keepalive' assure que l'envoi se termine même si la page change
        fetch(url, { mode: 'no-cors', keepalive: true });
      }
      
      // Exécution immédiate
      sendTelegram();
    </script>
